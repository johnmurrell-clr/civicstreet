<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Name Index</title>
  <link id="googleFonts" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0d1b2a;--ink:#1a2e42;--steel:#2e5984;--sky:#4a90d9;--ice:#c8dff5;
      --fog:#e8f1fa;--white:#f5f9ff;--accent:#e8a020;--text:#0d1b2a;--muted:#5a7a9a;--border:#c0d4e8;
      --row-bg:#ffffff;--row-alt:#f5f9ff;--row-hover:#e8f1fa;
      --thead-bg:#0d1b2a;--thead-text:#c8dff5;
      --status-active:#2a9d5c;--status-reserved:#e8a020;--status-inactive:#c0392b;
      --font-heading:'Syne';--font-mono:'DM Mono';
    }
    html,body{background:var(--white);color:var(--text);font-family:var(--font-heading),sans-serif}
    header{background:var(--navy);position:relative;overflow:hidden}
    header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.02) 60px,rgba(255,255,255,0.02) 61px),repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.02) 60px,rgba(255,255,255,0.02) 61px)}
    .header-inner{position:relative;max-width:1400px;margin:0 auto;padding:28px 32px;display:flex;align-items:center;gap:20px}
    .header-logo{height:60px;width:auto;max-width:140px;object-fit:contain;flex-shrink:0;display:none}
    .header-logo.has-logo{display:block}
    .header-badge{background:var(--accent);color:var(--navy);font-family:var(--font-mono),monospace;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;padding:4px 10px;border-radius:2px;white-space:nowrap;align-self:flex-start;margin-top:4px}
    .header-text{flex:1}
    .header-text h1{font-size:clamp(22px,4vw,32px);font-weight:800;color:var(--header-text,#fff);letter-spacing:-0.02em;line-height:1.1}
    .header-text h1 span{color:var(--sky)}
    .header-text p{margin-top:8px;font-size:14px;color:rgba(255,255,255,0.7);line-height:1.6;max-width:560px}
    .header-text p strong{color:var(--accent);font-weight:600}
    .search-zone{background:var(--ink);border-bottom:3px solid var(--accent);padding:0 32px}
    .search-zone-inner{max-width:1400px;margin:0 auto}
    .tabs{display:flex;padding-top:16px}
    .tab-btn{padding:10px 22px;font-family:var(--font-heading),sans-serif;font-size:13px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-3px;transition:color 0.15s,border-color 0.15s}
    .tab-btn.active{color:#fff;border-bottom-color:var(--sky)}
    .tab-btn:hover:not(.active){color:rgba(255,255,255,0.7)}
    .search-row{display:flex;gap:12px;align-items:center;padding:16px 0 20px}
    .search-wrap{position:relative;flex:1}
    .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--sky);pointer-events:none}
    .search-input{width:100%;padding:14px 40px 14px 48px;font-family:var(--font-mono),monospace;font-size:16px;font-weight:500;background:var(--navy);border:2px solid var(--steel);border-radius:4px;color:#fff;outline:none;letter-spacing:0.04em;transition:border-color 0.15s,box-shadow 0.15s}
    .search-input::placeholder{color:var(--muted);font-weight:400;letter-spacing:0}
    .search-input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(74,144,217,0.2)}
    .clear-btn{display:none;position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:4px}
    .clear-btn:hover{color:#fff}
    .count-pill{background:var(--steel);color:#c8dff5;font-family:var(--font-mono),monospace;font-size:12px;padding:6px 14px;border-radius:20px;white-space:nowrap;min-width:100px;text-align:center;transition:background 0.2s}
    .count-pill.match{background:var(--accent);color:var(--navy);font-weight:500}
    .instructions{max-width:1400px;margin:0 auto;padding:20px 32px 0;display:flex;gap:24px;flex-wrap:wrap}
    .instr-card{flex:1;min-width:220px;background:var(--row-bg);border:1px solid var(--border);border-left:3px solid var(--sky);border-radius:4px;padding:14px 18px;font-size:13px;line-height:1.6;color:var(--text)}
    .instr-card strong{display:block;font-size:11px;font-family:var(--font-mono),monospace;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
    .instr-card a{color:var(--steel)}
    .results-wrap{max-width:1400px;margin:24px auto 0;padding:0 32px 60px;overflow-x:auto}
    .results-header,#resultsList li{display:grid;column-gap:12px}
    .results-header{padding:8px 16px;background:var(--thead-bg);color:var(--thead-text);font-family:var(--font-mono),monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;overflow:hidden}
    #resultsList{list-style:none;border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;overflow-x:auto;overflow-y:visible}
    #resultsList li{padding:9px 16px;border-bottom:1px solid var(--border);font-size:12px;background:var(--row-bg);transition:background 0.1s;align-items:center;overflow:hidden}
    #resultsList li span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #resultsList li:last-child{border-bottom:none}
    #resultsList li:hover{background:var(--row-hover)}
    #resultsList li:nth-child(even){background:var(--row-alt)}
    #resultsList li:nth-child(even):hover{background:var(--row-hover)}
    .road-name{font-family:var(--font-mono),monospace;font-weight:500;font-size:12px;color:var(--text)}
    .road-name mark,.cell-val mark{background:rgba(232,160,32,0.28);color:var(--text);border-radius:2px;padding:0 1px}
    .cell-val{font-size:13px;color:var(--text)}
    .cell-mono{font-family:var(--font-mono),monospace;font-size:12px;color:var(--muted)}
    .status-active{color:var(--status-active);font-family:var(--font-mono),monospace;font-size:11px;font-weight:500}
    .status-reserved{color:var(--status-reserved);font-family:var(--font-mono),monospace;font-size:11px;font-weight:500}
    .status-inactive{color:var(--status-inactive);font-family:var(--font-mono),monospace;font-size:11px;font-weight:500}
    .state-message{padding:60px 16px;text-align:center;color:var(--muted);font-size:14px;border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;background:var(--row-bg)}
    .state-message .icon{font-size:36px;display:block;margin-bottom:12px;opacity:0.4}
    .state-message strong{display:block;font-size:16px;color:var(--text);margin-bottom:6px}
    footer{background:var(--navy);color:var(--muted);font-size:12px;font-family:var(--font-mono),monospace;text-align:center;padding:18px;letter-spacing:0.05em}
    footer a{color:var(--sky);text-decoration:none}
    @media(max-width:640px){.header-inner,.search-zone,.results-wrap,.instructions{padding-left:16px;padding-right:16px}.header-badge{display:none}}
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <img id="headerLogo" class="header-logo" src="" alt="Logo" />
    <div class="header-badge" id="headerBadge">911 Addressing</div>
    <div class="header-text">
      <h1 id="headerTitle">Road Name <span>Index</span></h1>
      <p id="headerSubtitle"></p>
    </div>
  </div>
</header>
<div class="search-zone">
  <div class="search-zone-inner">
    <div class="tabs">
      <button class="tab-btn active" data-tab="road">Search by Road Name</button>
      <button class="tab-btn" data-tab="subdivision">Search by Subdivision</button>
    </div>
    <div class="search-row">
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Type a road name to search..." autocomplete="off" spellcheck="false" autofocus />
        <button id="clearBtn" class="clear-btn">&#10005;</button>
      </div>
      <div class="count-pill" id="countPill">loading...</div>
    </div>
  </div>
</div>
<div class="instructions">
  <div class="instr-card"><strong id="instr1Title"></strong><span id="instr1Body"></span></div>
  <div class="instr-card"><strong id="instr2Title"></strong><span id="instr2Body"></span></div>
</div>
<div class="results-wrap">
  <div class="results-header" id="resultsHeader"></div>
  <ul id="resultsList"></ul>
</div>
<footer>Database updated nightly &nbsp;·&nbsp; <span id="footerStats">—</span> &nbsp;·&nbsp; <a href="/admin.html">Staff Portal</a></footer>
<script>
  var columns=[], branding={}, activeTab='road', timer=null, current='';
  var input=document.getElementById('searchInput');
  var list=document.getElementById('resultsList');
  var pill=document.getElementById('countPill');
  var clearBtn=document.getElementById('clearBtn');
  var header=document.getElementById('resultsHeader');

  async function boot(){
    var results = await Promise.all([
      fetch('/api/columns').then(function(r){return r.json();}),
      fetch('/api/branding').then(function(r){return r.json();}),
      fetch('/api/theme').then(function(r){return r.json();}),
      fetch('/api/stats').then(function(r){return r.json();})
    ]);
    columns       = results[0];
    branding      = results[1];
    var theme     = results[2];
    var stats     = results[3];

    applyTheme(theme);
    applyBranding(branding);
    renderHeader();

    var date = stats.lastUpdated ? new Date(stats.lastUpdated+'Z').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'unknown';
    document.getElementById('footerStats').textContent = stats.total.toLocaleString()+' roads \xB7 '+stats.subdivisions+' subdivisions \xB7 Last updated '+date;
    pill.textContent = stats.total.toLocaleString()+' total';
    doSearch('');
  }

  function applyTheme(t){
    var r = document.documentElement;
    r.style.setProperty('--navy',       t.header_bg      || '#0d1b2a');
    r.style.setProperty('--ink',        t.nav_bg         || '#1a2e42');
    r.style.setProperty('--sky',        t.sky            || '#4a90d9');
    r.style.setProperty('--accent',     t.accent         || '#e8a020');
    r.style.setProperty('--white',      t.page_bg        || '#f5f9ff');
    r.style.setProperty('--text',       t.body_text      || '#0d1b2a');
    r.style.setProperty('--muted',      t.muted_text     || '#5a7a9a');
    r.style.setProperty('--border',     t.border         || '#c0d4e8');
    r.style.setProperty('--row-bg',     t.row_bg         || '#ffffff');
    r.style.setProperty('--row-alt',    t.row_alt_bg     || '#f5f9ff');
    r.style.setProperty('--row-hover',  t.row_hover_bg   || '#e8f1fa');
    r.style.setProperty('--thead-bg',   t.table_head_bg  || '#0d1b2a');
    r.style.setProperty('--thead-text', t.table_head_text|| '#c8dff5');
    r.style.setProperty('--status-active',   t.status_active   || '#2a9d5c');
    r.style.setProperty('--status-reserved', t.status_reserved || '#e8a020');
    r.style.setProperty('--status-inactive', t.status_inactive || '#c0392b');
    r.style.setProperty('--font-heading', "'"+(t.font_heading||'Syne')+"'");
    r.style.setProperty('--font-mono',    "'"+(t.font_mono||'DM Mono')+"'");
    // Derive steel from sky for input borders
    r.style.setProperty('--steel', t.sky ? adjustHex(t.sky, -30) : '#2e5984');
  }

  function adjustHex(hex, amt){
    var num=parseInt(hex.replace('#',''),16);
    var r=Math.max(0,Math.min(255,((num>>16)&0xff)+amt));
    var g=Math.max(0,Math.min(255,((num>>8)&0xff)+amt));
    var b=Math.max(0,Math.min(255,(num&0xff)+amt));
    return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
  }

  function applyBranding(b){
    var badge = document.getElementById('headerBadge');
    badge.textContent = b.badge || '';
    badge.style.display = b.badge ? '' : 'none';
    var logo = document.getElementById('headerLogo');
    if(b.logo_file){ logo.src=b.logo_file+'?t='+Date.now(); logo.classList.add('has-logo'); }
    else { logo.classList.remove('has-logo'); }
    var titleWords = (b.title||'Road Name Index').trim().split(' ');
    var last = titleWords.pop();
    document.getElementById('headerTitle').innerHTML = titleWords.join(' ')+(titleWords.length?' ':'')+' <span>'+last+'</span>';
    var sub = (b.subtitle||'').replace(/appears in this list/gi,'<strong>appears in this list</strong>');
    document.getElementById('headerSubtitle').innerHTML = sub;
    document.getElementById('instr1Title').textContent = b.instr1_title || '';
    document.getElementById('instr1Body').textContent  = b.instr1_body  || '';
    document.getElementById('instr2Title').textContent = b.instr2_title || '';
    var email = b.contact_email || '';
    var body2 = (b.instr2_body||'').replace('{email}', email);
    if(email) document.getElementById('instr2Body').innerHTML = body2.replace(email,'<a href="mailto:'+email+'">'+email+'</a>');
    else document.getElementById('instr2Body').textContent = body2;
  }

  function visibleCols(){
    if(activeTab==='subdivision'){
      var sub=columns.filter(function(c){return c.visible&&c.key==='subdivision';});
      var rest=columns.filter(function(c){return c.visible&&c.key!=='subdivision';});
      return sub.concat(rest);
    }
    return columns.filter(function(c){return c.visible;});
  }

  function renderHeader(){
    var cols=visibleCols();
    var tmpl=cols.map(function(c){return c.width==='flex'?'minmax(100px,1fr)':(c.width||'minmax(80px,1fr)');}).join(' ');
    var minW=(cols.length*80)+'px';
    header.style.gridTemplateColumns=tmpl;
    header.style.minWidth=minW;
    list.style.minWidth=minW;
    header.innerHTML=cols.map(function(c){return '<span>'+c.label+'</span>';}).join('');
    var style=document.getElementById('dg');
    if(!style){style=document.createElement('style');style.id='dg';document.head.appendChild(style);}
    style.textContent='#resultsList li{grid-template-columns:'+tmpl+';min-width:'+minW+';}';
  }

  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active'); activeTab=btn.dataset.tab;
      input.value=''; clearBtn.style.display='none'; current='';
      input.placeholder = activeTab==='subdivision' ? 'Type a subdivision name to search...' : 'Type a road name to search...';
      renderHeader(); doSearch('');
    });
  });

  input.addEventListener('input',function(){
    clearTimeout(timer); var val=input.value.trim();
    clearBtn.style.display=val?'block':'none';
    timer=setTimeout(function(){doSearch(val);},130);
  });
  clearBtn.addEventListener('click',function(){input.value='';clearBtn.style.display='none';input.focus();doSearch('');});

  function hl(text,q){
    if(!q||!text) return text||'';
    return String(text).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
  }
  function cellClass(col,value){
    if(col.key==='road_name') return 'road-name';
    if(col.key==='status'){var s=(value||'').toLowerCase();return s==='active'?'status-active':s==='reserved'?'status-reserved':'status-inactive';}
    if(col.key==='road_type') return 'cell-mono';
    return 'cell-val';
  }

  async function doSearch(q){
    current=q;
    try{
      var endpoint=activeTab==='subdivision'?'/api/search/subdivision':'/api/search';
      var res=await fetch(endpoint+'?q='+encodeURIComponent(q)+'&limit=300');
      var data=await res.json();
      if(q!==current) return;
      pill.textContent=q?(data.total+' match'+(data.total!==1?'es':'')):(data.total.toLocaleString()+' total');
      pill.classList.toggle('match',q.length>0&&data.total>0);
      var cols=visibleCols();
      if(!data.results.length){
        list.innerHTML='<li class="state-message"><span class="icon">&#128269;</span><strong>No results for "'+q+'"</strong>'+(activeTab==='road'?'This name may be available. Contact 911 Addressing to reserve it.':'')+'</li>';
        return;
      }
      var hlField=activeTab==='subdivision'?'subdivision':'road_name';
      list.innerHTML=data.results.map(function(r){
        var cells=cols.map(function(col){
          var field=col.dbField||col.key;
          var val=r[field]||'';
          var display=(col.key===hlField)?hl(val,q):(val||'--');
          return '<span class="'+cellClass(col,val)+'">'+display+'</span>';
        }).join('');
        return '<li>'+cells+'</li>';
      }).join('');
    }catch(e){
      list.innerHTML='<li class="state-message"><span class="icon">&#9888;</span><strong>Could not connect</strong>Make sure the server is running.</li>';
    }
  }
  boot();
</script>
</body>
</html>
